services:
  # Backend API
  - type: web
    name: fastapi-backend
    env: docker
    repo: https://github.com/CrispinNi/TokenTree
    branch: main
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mysql-db
          property: connectionString

  # React Frontend
  - type: web
    name: react-frontend
    env: docker
    repo: https://github.com/CrispinNi/TokenTree
    branch: main
    rootDir: frontend
    plan: free
    autoDeploy: true

databases:
  - name: mysql-db
    plan: free
