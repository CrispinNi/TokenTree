services:
  # ===============================
  # FastAPI Backend
  # ===============================
  - type: web
    name: tokentree-api
    env: docker
    repo: https://github.com/CrispinNi/TokenTree
    branch: main
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tokentree-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: redis
          name: tokentree-redis
          property: connectionString

      - key: JWT_SECRET_KEY
        generateValue: true
  # ===============================
  # React Frontend
  # ===============================
  - type: web
    name: tokentree-frontend
    env: docker
    repo: https://github.com/CrispinNi/TokenTree
    branch: main
    rootDir: frontend
    plan: free
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://tokentree-api.onrender.com

  # ===============================
  # Celery Worker
  # ===============================
  - type: worker
    name: tokentree-celery-worker
    env: docker
    repo: https://github.com/CrispinNi/TokenTree
    branch: main
    rootDir: backend
    plan: free
    autoDeploy: true
    startCommand: celery -A app.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tokentree-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: redis
          name: tokentree-redis
          property: connectionString

      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: tokentree-redis
          property: connectionString

      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: tokentree-redis
          property: connectionString

  # ===============================
  # Celery Beat Scheduler
  # ===============================
  - type: worker
    name: tokentree-celery-beat
    env: docker
    repo: https://github.com/CrispinNi/TokenTree
    branch: main
    rootDir: backend
    plan: free
    autoDeploy: true
    startCommand: celery -A app.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tokentree-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: redis
          name: tokentree-redis
          property: connectionString

      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: tokentree-redis
          property: connectionString

      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: tokentree-redis
          property: connectionString

# ===============================
# PostgreSQL Database
# ===============================
databases:
  - name: tokentree-db
    plan: free

# ===============================
# Redis
# ===============================
services:
  - type: redis
    name: tokentree-redis
    plan: free