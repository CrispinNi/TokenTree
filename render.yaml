services:
  # ===============================
  # FastAPI Backend
  # ===============================
  - type: web
    name: tokentree-api
    env: docker
    repo: https://github.com/CrispinNi/TokenTree
    branch: main
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tokentree-db
          property: connectionString

      - key: REDIS_URL
        value: redis-cli --tls -u redis://default:gQAAAAAAAR36AAIncDIzN2E4ZGIzNDM0MDM0YmNlOTY5MWFmZmI4ZjY4ZmM5ZXAyNzMyMTA@pleasing-colt-73210.upstash.io:6379

      - key: JWT_SECRET_KEY
        generateValue: true

      - key: CRYPTOCOMPARE_API_KEY
        value: "8c9096723d026ce12a372432eb550048dfbd65c32a94191637a5c5249510ee08"

  # ===============================
  # React Frontend
  # ===============================
  - type: web
    name: tokentree-frontend
    env: docker
    repo: https://github.com/CrispinNi/TokenTree
    branch: main
    rootDir: frontend
    plan: free
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://fastapi-backend-6rew.onrender.com

  # ===============================
  # Celery Worker
  # ===============================
  - type: worker
    name: tokentree-celery-worker
    env: docker
    repo: https://github.com/CrispinNi/TokenTree
    branch: main
    rootDir: backend
    plan: free
    autoDeploy: true
    startCommand: celery -A app.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tokentree-db
          property: connectionString

      - key: REDIS_URL
        value: redis-cli --tls -u redis://default:gQAAAAAAAR36AAIncDIzN2E4ZGIzNDM0MDM0YmNlOTY5MWFmZmI4ZjY4ZmM5ZXAyNzMyMTA@pleasing-colt-73210.upstash.io:6379

      - key: CELERY_BROKER_URL
        value: redis-cli --tls -u redis://default:gQAAAAAAAR36AAIncDIzN2E4ZGIzNDM0MDM0YmNlOTY5MWFmZmI4ZjY4ZmM5ZXAyNzMyMTA@pleasing-colt-73210.upstash.io:6379

      - key: CELERY_RESULT_BACKEND
        value: redis-cli --tls -u redis://default:gQAAAAAAAR36AAIncDIzN2E4ZGIzNDM0MDM0YmNlOTY5MWFmZmI4ZjY4ZmM5ZXAyNzMyMTA@pleasing-colt-73210.upstash.io:6379

  # ===============================
  # Celery Beat Scheduler
  # ===============================
  - type: worker
    name: tokentree-celery-beat
    env: docker
    repo: https://github.com/CrispinNi/TokenTree
    branch: main
    rootDir: backend
    plan: free
    autoDeploy: true
    startCommand: celery -A app.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tokentree-db
          property: connectionString

      - key: REDIS_URL
        value: redis-cli --tls -u redis://default:gQAAAAAAAR36AAIncDIzN2E4ZGIzNDM0MDM0YmNlOTY5MWFmZmI4ZjY4ZmM5ZXAyNzMyMTA@pleasing-colt-73210.upstash.io:6379redis://default:********@pleasing-colt-73210.upstash.io:6379

      - key: CELERY_BROKER_URL
        value: redis-cli --tls -u redis://default:gQAAAAAAAR36AAIncDIzN2E4ZGIzNDM0MDM0YmNlOTY5MWFmZmI4ZjY4ZmM5ZXAyNzMyMTA@pleasing-colt-73210.upstash.io:6379

      - key: CELERY_RESULT_BACKEND
        value: redis-cli --tls -u redis://default:gQAAAAAAAR36AAIncDIzN2E4ZGIzNDM0MDM0YmNlOTY5MWFmZmI4ZjY4ZmM5ZXAyNzMyMTA@pleasing-colt-73210.upstash.io:6379

# ===============================
# PostgreSQL Database
# ===============================
databases:
  - name: tokentree-db
    plan: free
