version: "3.9"

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: tokentree
      MYSQL_USER: tokentree
      MYSQL_PASSWORD: tokentree_pw
      MYSQL_ROOT_PASSWORD: root_pw
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: mysql+aiomysql://tokentree:tokentree_pw@db:3306/tokentree
      JWT_SECRET_KEY: CHANGE_ME_SUPER_SECRET
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
